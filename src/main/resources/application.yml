spring:
  application:
    name: resumeAI

  ai:
    google:
      genai:
        #NUNCA SUBIR ESTÁ CHAVE NO GITHUB
        api-key:
        chat:
          options:
            model: gemini-1.5-flash
            max-tokens: 4096

  datasource:
    url: jdbc:postgresql://localhost:5432/resume_ia_db
    username: lucas_dev
    password: MuR8dzC14K
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            ##nunca subir estás informação no git hub
            client-id:
            client-secret:
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  #nunca subir está chave no git hub
  secret: 4a8f2c9d7e1b6043a5f8c2e9d4b7a1f63c8e2d9b5a7f4c1e8d3b6a9f2c5e8d1b
  expiration: 86400000
  refresh-expiration: 604800000

upload:
  dir: ./uploads
  allowed-types:
    - application/pdf
  max-size-mb: 10

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.resumeai: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
