# ?????????????????????????????????????????????????????????????
#  ResuméAI ? application.yml
#  Substitua os valores marcados com TODO pelas suas chaves reais
# ?????????????????????????????????????????????????????????????

spring:
  application:
    name: resumeAI

  # ?? BANCO DE DADOS ????????????????????????????????????????
  datasource:
    url: jdbc:postgresql://localhost:5432/resumeai_db
    username: lucas_dev
    password: MuR8dzC14K        # TODO: troque em produçăo
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ?? JPA / HIBERNATE ??????????????????????????????????????
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway cuida do schema ? năo deixe o Hibernate alterar
    show-sql: true              # false em produçăo
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ?? FLYWAY ???????????????????????????????????????????????
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ?? OAUTH2 ? LOGIN COM GOOGLE ?????????????????????????????
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: TODO_SEU_GOOGLE_CLIENT_ID         # Google Cloud Console
            client-secret: TODO_SEU_GOOGLE_CLIENT_SECRET  # Google Cloud Console
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  # ?? UPLOAD DE ARQUIVO (currículo PDF) ????????????????????
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# ?? JWT ????????????????????????????????????????????????????
jwt:
  secret: TODO_CHAVE_SECRETA_MIN_256_BITS_TROQUE_ISSO_AGORA   # mín. 32 caracteres aleatórios
  expiration: 86400000      # 24 horas em milissegundos
  refresh-expiration: 604800000  # 7 dias em milissegundos

# ?? API DE IA ?????????????????????????????????????????????
ai:
  provider: anthropic         # ou "openai"
  anthropic:
    api-key: TODO_SUA_CHAVE_ANTHROPIC
    model: claude-sonnet-4-20250514
    max-tokens: 4096
    base-url: https://api.anthropic.com/v1
  openai:                     # alternativa ? preencha se preferir OpenAI
    api-key: TODO_SUA_CHAVE_OPENAI
    model: gpt-4o
    base-url: https://api.openai.com/v1

# ?? UPLOAD ? pasta local de armazenamento ?????????????????
upload:
  dir: ./uploads              # pasta criada na raiz do projeto
  allowed-types:
    - application/pdf
  max-size-mb: 10

# ?? SPRINGDOC / SWAGGER ???????????????????????????????????
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

# ?? ACTUATOR ?????????????????????????????????????????????
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# ?? LOGGING ??????????????????????????????????????????????
logging:
  level:
    com.resumeai: DEBUG
    org.springframework.security: DEBUG   # remova em produçăo
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ?? SERVIDOR ?????????????????????????????????????????????
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
